<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <!-- <link rel="stylesheet" href="STYLE.CSS"> -->
     <style>
        body{
    font-family: Arial, Helvetica, sans-serif;
    background-color: rgb(243, 241, 242);
    margin: 20PX;
}
h1{
    color: rgb(14, 14, 14);
    text-align: center;
}
.block-menu a{
    display: block;
    width:200px ;
    background-color: rgb(37, 10, 247);
    color: white;
    padding: 10px;
    border-radius: 8px;
    margin: 5px 0px;
}
.inline-menu a{
    width: 200px;
    display: inline;
    color: white;
    background-color: rgb(158, 6, 6);
    padding: 10px;
    border-radius: 5px;
}
.inline-block menu a{
    width: 200px;
    display: inline-block;
    color: white;
    background-color: black;
    padding: 10px;
    border-radius: 5px;
}
.float-menu a{
    width: 200px;
    display: float;
    color: white;
    background-color: black;
    padding: 10px;
    border-radius: 5px;
}

     </style>
     </head>
<body>
    <h1> Navigation Menu Bar</h1>
    <h2> block example</h2>
    <div class="block-menu">
    <a href="#">home</a>
    <a href="#">products</a>
    <a href="#">about</a>
    <a href="#">contact</a>
    </div>

    <h2> Inline example</h2>
    <div class="inline-menu">
    <a href="#">home</a>
    <a href="#">products</a>
    <a href="#">about</a>
    <a href="#">contact</a>
    </div>

    <h2> inline block example</h2>
    <div class="inline-block menu">
    <a href="#">home</a>
    <a href="#">products</a>
    <a href="#">about</a>
    <a href="#">contact</a>
    </div>

    <h2> Float example</h2>
    <div class="float-menu">
    <a href="#">home</a>
    <a href="#">products</a>
    <a href="#">about</a>
    <a href="#">contact</a>


</div>
</body>
</html>
